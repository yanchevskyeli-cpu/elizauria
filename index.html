<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elizauria — Choose Your Language</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=12">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a1533'/><polygon points='50,20 58,42 82,42 62,56 70,80 50,64 30,80 38,56 18,42 42,42' fill='%23e0b94d'/></svg>">
<style>
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(165deg,#16296b,var(--navy) 70%);position:relative;overflow:hidden;padding:2rem 1rem}
  .lang-crest{width:84px;height:84px;margin-bottom:1.2rem;filter:drop-shadow(0 6px 16px rgba(0,0,0,.5));position:relative;z-index:2}
  h1{font-family:var(--serif);color:#fff;font-size:clamp(1.6rem,5vw,2.6rem);text-align:center;position:relative;z-index:2;margin-bottom:.4rem}
  .sub-brand{color:var(--gold-2);letter-spacing:.3em;text-transform:uppercase;font-size:.72rem;text-align:center;position:relative;z-index:2;margin-bottom:3rem}
  .langs{display:flex;gap:2.2rem;flex-wrap:wrap;justify-content:center;position:relative;z-index:2}
  .lang{display:flex;flex-direction:column;align-items:center;gap:.6rem;cursor:pointer;background:none;border:none;transition:.25s}
  .lang:hover{transform:translateY(-6px)}
  .lang .n{font-family:var(--serif);font-size:1.5rem;color:var(--gold-2);font-weight:700}
  .lang .circle{width:110px;height:110px;border-radius:50%;overflow:hidden;border:3px solid var(--gold);
    box-shadow:0 14px 34px -12px rgba(0,0,0,.7),0 0 0 6px rgba(224,185,77,.15);transition:.25s;background:#fff}
  .lang:hover .circle{box-shadow:0 18px 40px -12px var(--gold),0 0 0 8px rgba(224,185,77,.3)}
  .lang .circle svg{width:100%;height:100%;display:block}
  .lang .lbl{color:#fff;font-weight:700;letter-spacing:.18em;font-size:.85rem}
  @media(max-width:560px){.langs{gap:1.2rem}.lang .circle{width:84px;height:84px}}
</style>
</head>
<body>
<div class="aurora"></div>

<svg class="lang-crest" viewBox="0 0 100 100" aria-hidden="true"><circle cx="50" cy="50" r="48" fill="#12235c" stroke="#e0b94d" stroke-width="3"/><polygon points="50,18 59,42 85,42 64,58 72,84 50,68 28,84 36,58 15,42 41,42" fill="#e0b94d"/></svg>
<h1>Choose Your Language</h1>
<div class="sub-brand">Elizauria · Sovereign Republic</div>

<div class="langs">
  <button class="lang" onclick="go('en')">
    <span class="n">1</span>
    <span class="circle">
      <svg viewBox="0 0 60 60" preserveAspectRatio="xMidYMid slice"><rect width="60" height="60" fill="#b22234"/><g fill="#fff"><rect y="4.6" width="60" height="4.6"/><rect y="13.8" width="60" height="4.6"/><rect y="23" width="60" height="4.6"/><rect y="32.2" width="60" height="4.6"/><rect y="41.4" width="60" height="4.6"/><rect y="50.6" width="60" height="4.6"/></g><rect width="30" height="27.6" fill="#3c3b6e"/><g fill="#fff"><circle cx="6" cy="5" r="1.6"/><circle cx="15" cy="5" r="1.6"/><circle cx="24" cy="5" r="1.6"/><circle cx="10.5" cy="11" r="1.6"/><circle cx="19.5" cy="11" r="1.6"/><circle cx="6" cy="17" r="1.6"/><circle cx="15" cy="17" r="1.6"/><circle cx="24" cy="17" r="1.6"/><circle cx="10.5" cy="23" r="1.6"/><circle cx="19.5" cy="23" r="1.6"/></g></svg>
    </span>
    <span class="lbl">ENGLISH</span>
  </button>

  <button class="lang" onclick="go('he')">
    <span class="n">2</span>
    <span class="circle">
      <svg viewBox="0 0 60 60" preserveAspectRatio="xMidYMid slice"><rect width="60" height="60" fill="#fff"/><rect y="8" width="60" height="8" fill="#0038b8"/><rect y="44" width="60" height="8" fill="#0038b8"/><g stroke="#0038b8" stroke-width="2.4" fill="none"><path d="M30 20 L38.66 35 L21.34 35 Z"/><path d="M30 40 L21.34 25 L38.66 25 Z"/></g></svg>
    </span>
    <span class="lbl">HEBREW</span>
  </button>

  <button class="lang" onclick="go('ru')">
    <span class="n">3</span>
    <span class="circle">
      <svg viewBox="0 0 60 60" preserveAspectRatio="xMidYMid slice"><rect width="60" height="20" fill="#fff"/><rect y="20" width="60" height="20" fill="#0039a6"/><rect y="40" width="60" height="20" fill="#d52b1e"/></svg>
    </span>
    <span class="lbl">RUSSIAN</span>
  </button>

  <button class="lang" onclick="go('uk')">
    <span class="n">4</span>
    <span class="circle">
      <svg viewBox="0 0 60 60" preserveAspectRatio="xMidYMid slice"><rect width="60" height="30" fill="#0057b7"/><rect y="30" width="60" height="30" fill="#ffd700"/></svg>
    </span>
    <span class="lbl">UKRAINIAN</span>
  </button>
</div>

<script>
function go(lang){
  try{ localStorage.setItem('elz_lang',lang); }catch(e){}
  location.href='account.html';
}
</script>
</body>
</html>
